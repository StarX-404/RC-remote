name: Build RC Remote APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Ensure Gradle/Kotlin always run with a supported JDK.
      JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
      ORG_GRADLE_JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Force JDK 17 for all next steps
        run: |
          echo "JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> "$GITHUB_ENV"
          echo "ORG_GRADLE_JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> "$GITHUB_ENV"

      - name: Verify Java runtime
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          ./gradlew --version

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rc-remote-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: rc-remote-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Run Lint checks
        run: ./gradlew lint --stacktrace
        continue-on-error: true

      - name: Run Unit Tests
        run: ./gradlew test --stacktrace
        continue-on-error: true

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results*.html
          retention-days: 7

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/
          retention-days: 7
